name: build-and-publish-image

# Builds the bundled LanEx image and publishes it to GitHub Container Registry
# (ghcr.io/<owner>/lanex). Fires on a version tag (v*) or manual dispatch.
#
# The published package inherits the repository's visibility (PRIVATE by default).
# To let people `docker pull` without auth, make the *package* public from the
# GitHub UI — that is a deliberate, separate action from making the repo public.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
