# CI: prove the suite is green and every JS module parses, on the Python
# versions the package supports (fast, container-free — the tests that need a
# toolchain are skipped/guarded). A separate `rtl2gds` job runs a REAL RTL->GDS
# flow inside the official LibreLane image; it is heavy (pulls a ~GB image +
# fetches a PDK, ~15-30 min), so it runs on: main, a DAILY schedule, manual
# dispatch, and any pull request that changes architectural Python (controller/
# server/tests) or packaging/CI — but NOT a pure UI/UX PR (server/static only).
# Zero third-party Actions beyond the official setup-python/checkout/setup-node.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *" # daily, 06:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node (for `node --check` JS syntax validation only)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (pulls in librelane as the only dependency)
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest

      - name: Python tests
        run: python -m pytest lanex/tests -q

      - name: JavaScript syntax check
        run: |
          for f in lanex/server/static/app.js lanex/server/static/modules/*.js lanex/server/static/modules/ide/*.js; do
            node --check "$f"
          done

      - name: Static hygiene (no emoji pictographs — round-26 rule, locks D10)
        run: |
          # Fail if any U+1F300–U+1FAFF pictograph creeps back into first-party
          # static assets. Typographic glyphs (⚠ ⬇ ✕ ✓ ↻ ⛭) are intentional and
          # out of this range. vendor/ (echarts etc.) is third-party, excluded.
          hits=$(grep -rlP "[\x{1F300}-\x{1FAFF}]" lanex/server/static \
                   --include='*.js' --include='*.html' --include='*.css' \
                   | grep -v '/vendor/' || true)
          if [ -n "$hits" ]; then
            echo "Emoji pictographs found (use modules/icons.js instead):"; echo "$hits"; exit 1
          fi
          echo "no emoji pictographs — OK"

      - name: Build the wheel and confirm bundled data is present
        run: |
          python -m pip install build
          python -m build --wheel
          python - <<'PY'
          import zipfile, glob, sys
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(whl).namelist()
          # One sentinel per fragile asset class (the recursive package-data globs
          # are exactly what historically dropped assets from the wheel). Plain
          # strings are exact-file checks; a trailing "/" means "at least one
          # member under this directory".
          needed = [
              "lanex/server/static/index.html",
              "lanex/server/static/app.js",
              "lanex/server/static/styles.css",
              "lanex/server/static/modules/api.js",     # modules/
              "lanex/server/static/modules/ide/",       # nested modules
              "lanex/server/static/vendor/",            # echarts + fonts + logos
              "lanex/controller/plugins_registry.json",
              "lanex/controller/templates/",            # project templates w/ .v sources
          ]
          def present(n):
              if n.endswith("/"):
                  return any((("/" + n) in ("/" + x)) or x.startswith(n) for x in names)
              return any(x.endswith(n) for x in names)
          missing = [n for n in needed if not present(n)]
          if missing:
              print("MISSING from wheel:", missing); sys.exit(1)
          print("wheel OK:", whl)
          PY

  # I2 — advance warning when librelane's pre-release/main breaks a private-API
  # touchpoint LanEx depends on. Non-blocking (continue-on-error): it never fails
  # a PR, it just surfaces the break early via the compat canary.
  compat-canary:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install LanEx against pre-release librelane
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install --pre --upgrade librelane || echo "no pre-release available; using released"
          pip install pytest
      - name: Compat canary (probe + version-range shims)
        run: python -m pytest lanex/tests/test_compat.py -q

  # Decide whether the heavy RTL->GDS job should run for a PULL REQUEST: only
  # when it touches architectural Python (controller/server/tests), packaging,
  # or the CI itself — a pure UI/UX PR (server/static: JS/CSS/HTML) skips it.
  # push/schedule/dispatch always run. No third-party action — a plain git diff.
  detect-arch:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "non-PR event -> run"; echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          if ! changed="$(git diff --name-only "$base" "$head" 2>/dev/null)"; then
            echo "could not diff $base..$head -> run to be safe"
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "changed files:"; echo "$changed"
          if printf '%s\n' "$changed" | grep -Eq '\.py$|^pyproject\.toml$|^scripts/ci|^\.github/workflows/ci\.yml$'; then
            echo "architectural change -> run"; echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "UI/UX/docs only -> skip"; echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  # Complete RTL->GDS smoke: scaffold the `counter` design with LanEx's own
  # generator, then run it through the runner's local path (the real "Run flow"
  # code path) to a GDSII. The flow needs the whole EDA toolchain + a PDK, so it
  # runs inside the official LibreLane image via `docker run` — NOT a
  # `container:` job: that makes GitHub inject a Node runtime the nix-based image
  # can't exec ("no such file or directory"), which failed the first attempt.
  # Here checkout runs on the host; only our shell runs in the image.
  rtl2gds:
    name: Full RTL->GDS smoke (counter, sky130)
    needs: detect-arch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && needs.detect-arch.outputs.run == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Run RTL->GDS in the LibreLane image
        run: |
          # Keep this image tag in sync with the librelane floor in
          # pyproject.toml (dependencies: librelane>=3.0.4,<3.1).
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/work -w /work \
            -e LANEX_RTL2GDS=1 -e PDK_ROOT=/work/.pdk \
            ghcr.io/librelane/librelane:3.0.4 \
            bash scripts/ci-rtl2gds.sh
