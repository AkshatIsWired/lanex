# LanEx — one-command bundled cockpit.
#
#   docker compose up
#
# Then open http://localhost:8765
# Put your HDL projects under ./work (mounted at /work inside the container).
services:
  lanex:
    build:
      context: .
      args:
        # Pinned to the LibreLane release LanEx is tested against (matches pyproject's
        # librelane==). Bump deliberately after re-testing.
        LIBRELANE_TAG: "3.0.4"
        # For full independence, build from YOUR OWN mirror instead of upstream — set
        # this to the digest in base-image.lock (see scripts/mirror-base.sh):
        # BASE_IMAGE: ghcr.io/akshatiswired/lanex-base@sha256:<digest>
    image: lanex:latest
    container_name: lanex
    ports:
      - "8765:8765"
    volumes:
      - ./work:/work
    # Force reliable public DNS inside the container. On WSL2 the host's
    # /etc/resolv.conf is frequently broken (UDP DNS bug), and Docker copies that
    # broken resolver into the container at start — which makes the sky130 PDK
    # download (`ciel fetch`) time out. Pinning DNS here fixes it permanently and
    # survives WSL resets (unlike patching the host's resolv.conf, which gets wiped).
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
